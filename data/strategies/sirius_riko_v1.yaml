  # Pre-debut (turns 1-12): flex — bond building, prioritize Sirius friendship
  # Summer camp (turns 13-15): training
  13: { action: train, note: "Junior training (Early Jul)" }
  14: { action: train, note: "Junior training (Late Jul)" }
  15: { action: train, note: "Junior training (Early Aug)" }
