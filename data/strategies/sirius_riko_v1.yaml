schedule_blocks: []

# === RECREATION POLICY ===
recreation:
  enabled: true
  sources:
    team_sirius:
      total: 7
      special_index: 7
    riko:
      total: 13
      available_after: summer_camp_1
  energy_recovery: true
  mood_recovery: true

# === RACE POLICY ===
race:
  g1_policy: always
  g2_policy: skip_for_training
  g3_policy: skip_for_training
  skip_for:
    - double_friendship_training
  rival_speed_target: 3000

# === SKILL POLICY ===
skills:
  defer_until_sp: 2500
  defer_until_turn: 70

# === FRIENDSHIP POLICY ===
friendship:
  priority_order: [team_sirius, riko]
  deadlines:
    team_sirius:
      by_turn: 18
      on_miss: restart
    riko:
      by_turn: 36
      on_miss: warn

# === ITEM PRIORITIES (highest first) ===
# From video: Scholar's Hat and Charming (Pretty Mirror) are top priority.
# Training Application and Coaching Megaphone are IGNORE.
# Artisan Hammer is included (unlike standard Trackblazer).
item_priorities:
  # Tier 1: stat items that work without training
  - scholar_hat
  - charming
  - grilled_carrots
  # Tier 2: race boosters
  - master_hammer
  - artisan_hammer
  # Tier 3: stat-specific training boosters
  - speed_ankle_weights
  - power_ankle_weights
  - stamina_ankle_weights
  - guts_ankle_weights
  # Tier 4: direct stat items
  - manual
  - scroll
  # Tier 5: mood/condition
  - plain_cupcake
  - berry_cupcake
  # Tier 6: training boosts (2T megaphone > 3T)
  - empowering_mega
  - good_luck_charm
  - reset_whistle
  # Tier 7: energy recovery (lower priority — recreations handle most)
  - vita_65
  - vita_40
  - royal_kale
  - vita_20
  # Tier 8: motivating mega last of the buyables
  - motivating_mega
  # Condition cures (buy if condition appears)
  - rich_hand_cream
  - miracle_cure
  - practice_dvd
  - pocket_planner
  - smart_scale
  - aroma_diffuser
  - fluffy_pillow
