# Team Sirius + Riko — SS Rank Strategy
# Precise turn-by-turn schedule decoded from video guide.
# Character portraits = recreation, race cards = fixed races,
# SPARE = flex/training turn. Most turns are fixed.

id: sirius_riko_v1
name: "Team Sirius + Riko"
scenario: trackblazer
runspec: sirius_speed_v1
max_turns: 72

# Training turns are rare in this strategy (most turns are race/recreation).
# When energy is too low to train, burn an energy drink rather than rest —
# a wasted training turn is more painful than a consumed drink here.
drink_before_rest: true

