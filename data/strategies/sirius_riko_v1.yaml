schedule_blocks: []

# === RECREATION POLICY ===
recreation:
  enabled: true
  sources:
    team_sirius:
      total: 7
      special_index: 7
    riko:
      total: 13
      available_after: summer_camp_1
  energy_recovery: true
  mood_recovery: true

# === RACE POLICY ===
race:
  g1_policy: always
  g2_policy: skip_for_training
  g3_policy: skip_for_training
  skip_for:
    - double_friendship_training
  rival_speed_target: 3000

# === SKILL POLICY ===
skills:
  defer_until_sp: 1200
  defer_until_turn: 70

# === FRIENDSHIP POLICY ===
friendship:
  priority_order: [team_sirius, riko]
  deadlines:
    team_sirius:
      by_turn: 18
      on_miss: restart
    riko:
      by_turn: 36
      on_miss: warn

