# Event choice overrides — Tier 0 (checked before the knowledge base)
#
# Each rule matches if text_contains is found (case-insensitive) in the event text.
# Optional conditions: energy_min, energy_max, turn_min, turn_max
#
# choice: 0-based index (0 = first option, 1 = second, etc.)

# === Character-specific event chains (check FIRST) ===

# Kitasan Black — "Paying It Forward" event chain, pick choice 2
- text_contains: "paying it forward"
  choice: 1
  note: "Kitasan Black event chain — choice 2 for better rewards"

# Team Sirius — "A Second Serving of Training" — pick speed (choice 2) unless speed >1000
- text_contains: "second serving of training"
  choice: 1
  note: "Speed run option — best for Sirius speed build"

# Riko Kashimoto — "Unexpected Side" — pick choice 2
- text_contains: "unexpected side"
  choice: 1
  note: "Riko event — choice 2 required"

# "Mystery Fortune Ritual" — pick choice 2
- text_contains: "mystery fortune ritual"
  choice: 1
  note: "Mystery Fortune Ritual — option 2"

