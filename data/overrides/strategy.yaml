# Training strategy overrides
# These override config/default.yaml values and scorer defaults.

# Stat weight overrides by game phase
# condition: early_game (turn < 24) | late_game (turn > 50) | always
stat_weight_overrides:
  - condition: early_game
    weights:
      speed: 1.0      # Early game: don't over-invest in speed, build bonds
      stamina: 0.9
      power: 0.8
      guts: 0.7
      wit: 1.1        # Wit early = better training efficiency all run

  - condition: late_game
    weights:
      speed: 1.5      # Late game: max speed
      stamina: 1.3    # And stamina for finals
      power: 0.9
      guts: 0.6
      wit: 0.4        # Wit less useful late game

# Skills to never buy regardless of priority
skill_blacklist:
  - "Recovery (Medium)"
  - "Healing Wave"

# Skills the AI will actively try to acquire.
# Each entry can be a simple name (string) or an object with max_circle:
#   - "Acceleration Boost"              # single-circle only (default)
#   - name: "Late Bloomer"
#     max_circle: 2                     # allow double-circle for this skill
#
# Skills on this list bypass normal cost thresholds and are always bought
# if available and affordable.
skill_priority_list:
  - "Late Bloomer"
  - "Acceleration Boost"

# Whether to allow double-circling (upgrading) skills at all.
# Set to false for parent/factor runs where breadth > depth.
# Even when true, only skills on the priority list with max_circle: 2
# will be double-circled.
allow_double_circle: false

# Energy threshold overrides (null = use config value)
rest_energy_override: null         # e.g. 25 to rest earlier
energy_penalty_override: null      # e.g. 35 to penalize sooner
bond_priority_turns_override: null # e.g. 20 to shorten bond phase

# Per-scenario rest thresholds. Trackblazer dips into low energy
# during race sequences, so only rest when critically low.
scenario_rest_thresholds:
  trackblazer: 5

# Race strategy (especially important for Trackblazer which has ~30 races)
race_strategy:
  # How often to proactively enter races in Trackblazer (every N turns).
  # Lower = more aggressive. 2 = race every other turn.
  race_interval: 2

  # Skip racing for the first N turns to build base stats/bonds.
  skip_early_turns: 5

  # Preferred distance range (metres). Set to your trainee's aptitude.
  # Mile=1600, Medium=2000/2400, Long=2500+, Sprint=1200
  preferred_distances: [1600, 2000, 2400]

  # Preferred surface. Wrong surface is a big penalty in race scoring.
  preferred_surface: turf   # turf | dirt

# Shop item strategy (Trackblazer only)
shop_strategy:
  # Total stat gain threshold for "exceptional training".
  # Training with gains above this overrides non-urgent racing and
  # triggers Good-Luck Charm usage. Set based on training level and
  # support deck quality. ~30 is mid-career with decent cards.
  exceptional_gain_threshold: 30

  # Items to never buy regardless of tier (by item key).
  # Notepads (+3 stat) are excluded by default in code.
  blacklist: []
