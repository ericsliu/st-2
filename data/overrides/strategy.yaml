# Training strategy overrides
# These override config/default.yaml values and scorer defaults.

# Stat weights and phase overrides are now in the runspec file
# (data/runspecs/parent_balanced_v1.yaml). See data/runspecs/README.md.

# Skill prerequisites — must buy prereq before the skill
skill_prereqs:
  "Daring Strike": "Early Start"
  "Professor of Curvature": "Corner Adept"

# Skills to never buy regardless of priority
skill_blacklist:
  - "Recovery (Medium)"
  - "Healing Wave"
  - "Flustered"

# Skills the AI will actively try to acquire.
# priority: 0=never, 1-4=low, 5-7=mid, 8-9=high, 10=must-buy
# Unknown skills default to priority 0 (skip).
skill_priority_list:
  # Must-buy (10)
  - {name: "Straightaway Spurt", priority: 10}
  - {name: "Uma Star", priority: 10}
  - {name: "Encroaching Shadow", priority: 10}
  - {name: "Blast Forward", priority: 10}
  - {name: "Daring Strike", priority: 10}
  - {name: "Professor of Curvature", priority: 10}
  - {name: "Swinging Maestro", priority: 10}
  # Top-tier acceleration (9)
  - {name: "Sturm und Drang", priority: 6}
  - {name: "Masterful Gambit", priority: 6}
  # Core End Closer + distance corners/straights (8)
  - {name: "End Closer Straightaways", priority: 8}
  - {name: "End Closer Corners", priority: 8}
  - {name: "End Closer Savvy", priority: 8}
  - {name: "Come What May", priority: 8}
  - {name: "Crusader", priority: 8}
  - {name: "Strategist", priority: 0}
  - {name: "The Coast Is Clear", priority: 8}
  - {name: "I Can See Right Through", priority: 0}
  - {name: "Mile Corners", priority: 8}
  - {name: "Mid-Distance Corners", priority: 8}
  - {name: "Medium Corners", priority: 8}
  - {name: "Long-Distance Corners", priority: 8}
  - {name: "Long Corners", priority: 8}
  - {name: "Short-Distance Corners", priority: 8}
  - {name: "Sprint Corners", priority: 8}
  - {name: "Mile Straightaways", priority: 8}
  - {name: "Mid-Distance Straightaways", priority: 8}
  - {name: "Medium Straightaways", priority: 8}
  - {name: "Long-Distance Straightaways", priority: 8}
  - {name: "Long Straightaways", priority: 8}
  - {name: "Short-Distance Straightaways", priority: 8}
  - {name: "Sprint Straightaways", priority: 8}
  - {name: "Straightaway Recover", priority: 8}
  - {name: "Outer Post Efficiency", priority: 8}
  # Good speed/position skills (7)
  - {name: "Lead the Charge", priority: 7}
  - {name: "Forward, March", priority: 7}
  - {name: "Early Start", priority: 10}
  - {name: "Firm Course Menace", priority: 7}
  - {name: "Radiant Star", priority: 7}
  # Recovery skills (6)
  - {name: "Sleeping Lion", priority: 6}
  - {name: "Standing By", priority: 6}
  - {name: "Go-Home Specialist", priority: 6}
  - {name: "After-School Stroll", priority: 6}
  - {name: "Levelheaded", priority: 6}
  # Corner recovery / positioning (9)
  - {name: "Corner Recovery", priority: 9}
  - {name: "Tail Held High", priority: 9}
  # Ground condition skills (6)
  - {name: "Firm Conditions", priority: 6}
  - {name: "Wet Conditions", priority: 6}
  # Decent general skills (5)
  - {name: "Corner Adept", priority: 5}
  - {name: "Inner Lane", priority: 5}
  - {name: "Intense Gaze", priority: 5}
  # Low priority (4)
  - {name: "Glittering Star", priority: 4}

# Whether to allow double-circling (upgrading) skills at all.
# Set to false for parent/factor runs where breadth > depth.
# Even when true, only skills on the priority list with max_circle: 2
# will be double-circled.
allow_double_circle: false

# Energy threshold overrides (null = use config value)
rest_energy_override: null         # e.g. 25 to rest earlier
energy_penalty_override: null      # e.g. 35 to penalize sooner
bond_priority_turns_override: null # e.g. 20 to shorten bond phase

# Per-scenario rest thresholds. Trackblazer dips into low energy
# during race sequences, so only rest when critically low.
scenario_rest_thresholds:
  trackblazer: 5

# Trainee aptitudes are now read live from Full Stats screen each turn.
# No longer set manually here.

# Race strategy (especially important for Trackblazer which has ~30 races)
race_strategy:
  # How often to proactively enter races in Trackblazer (every N turns).
  # Lower = more aggressive. 2 = race every other turn.
  race_interval: 2

  # Skip racing for the first N turns to build base stats/bonds.
  skip_early_turns: 5

  # Preferred distance range (metres). Set to your trainee's aptitude.
  # Sprint=1000-1200, Mile=1600, Medium=2000/2400, Long=2500+
  # Curren Chan: Sprint A, Mile B — focus on short races
  preferred_distances: [1200, 1600]

  # Preferred surface. Wrong surface is a big penalty in race scoring.
  preferred_surface: turf   # turf | dirt

# Shop item strategy (Trackblazer only)
# Skill point reserve — keep at least this many SP for end-of-run skill purchases.
# Skills will only be bought if SP exceeds this threshold.
skill_pts_reserve: 800

shop_strategy:
  # Total stat gain threshold for "exceptional training".
  # Training with gains above this overrides non-urgent racing and
  # triggers Good-Luck Charm usage. Set based on training level and
  # support deck quality. ~30 is mid-career with decent cards.
  exceptional_gain_threshold: 30

  # Items to never buy regardless of tier (by item key).
  # Notepads (+3 stat) are excluded by default in code.
  blacklist: []
