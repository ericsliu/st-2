# Parent Builder — End Guts (v1)
# Guts raised to speed-tier priority. For trainees that benefit from
# late-race stamina conservation and positioning power.

id: end_guts_v1
name: "End Guts"
run_type: parent_builder
description: "Parent builder with guts prioritized alongside speed. Targets high guts for late-race power."
distance_target: medium
style_target: leader

stat_targets:
  speed:
    minimum: 500
    target: 800
    excellent: 1000
    values: [1.2, 0.9, 0.7, 0.4]
  stamina:
    minimum: 350
    target: 600
    excellent: 800
    cap: 600
    values: [0.9, 0.6, 0.3, 0.1]
  power:
    minimum: 350
    target: 600
    excellent: 800
    cap: 600
    values: [0.9, 0.5, 0.3, 0.1]
  guts:
    minimum: 400
    target: 700
    excellent: 900
    values: [1.2, 0.9, 0.7, 0.4]
  wit:
    minimum: 300
    target: 500
    excellent: 800
    values: [1.0, 0.8, 0.6, 0.3]

phase_weights:
  - condition: early_game
    weights:
      speed: 1.2
      stamina: 0.8
      power: 0.8
      guts: 1.2
      wit: 1.0
  - condition: late_game
    weights:
      speed: 2.0
      stamina: 0.5
      power: 0.9
      guts: 2.0
      wit: 0.4

policy:
  bond_future_value: 0.9
  skill_point_value: 0.35
  race_progress_value: 0.8
  failure_risk_penalty: 1.4
  energy_preservation: 0.8
  overshoot_penalty: 0.7

constraints:
  must_complete_goal_races: true
  max_failure_rate: 0.12
  min_energy_for_training: 50
  rest_energy_threshold: 25
