# Parent Builder — Long Distance (v1)
# Conservative stats, speed+stamina priority, low risk tolerance.

id: parent_long_v1
name: "Parent Long-Distance"
run_type: parent_builder
description: "Long-distance parent builder. Prioritizes speed and stamina with conservative risk management."
distance_target: long
style_target: leader

stat_targets:
  speed:
    minimum: 500
    target: 850
    excellent: 950
    values: [1.0, 0.8, 0.25, 0.05]
  stamina:
    minimum: 550
    target: 700
    excellent: 800
    values: [1.2, 0.9, 0.1, 0.0]
  power:
    minimum: 350
    target: 500
    excellent: 600
    values: [0.9, 0.6, 0.15, 0.0]
  guts:
    minimum: 250
    target: 350
    excellent: 450
    values: [0.7, 0.4, 0.1, 0.0]
  wit:
    minimum: 300
    target: 450
    excellent: 550
    values: [0.8, 0.5, 0.15, 0.0]

policy:
  bond_future_value: 0.9
  skill_point_value: 0.35
  race_progress_value: 0.8
  failure_risk_penalty: 1.2
  energy_preservation: 0.7
  overshoot_penalty: 0.8

constraints:
  must_complete_goal_races: true
  max_failure_rate: 0.15
  min_energy_for_training: 45
  rest_energy_threshold: 20
